<!DOCTYPE html>
<head>
    <title>register form</title>
</head>
<body>
    <center>

    <h1>Student Register Form</h1><br>
    <form>
        <table border="1">
            <tr>
                <td>Name:</td> <td><input type="text" placeholder="Enter your name"></td>
            </tr>
            <tr>
                <td>Age:</td> <td><input type="number" placeholder="Enter your age"></td>
            </tr>
            <tr>
                <td>Address:</td> <td><input type="text" placeholder="Enter your Address"></td>
            </tr>
            <tr>
                <td>Gender:</td> <td><input type="radio"name="Gender">Male <input type="radio"name="Gender">Female</td>
            </tr>
            <tr>
                <td>Department:</td> <td><select>
                    <option>Python</option>
                    <option>java</option>
                    <option>c++</option>
                </select>
            </tr>
            <tr>
                <td><input type="submit"></td><td><input type="reset"></td>
            </tr>

        </table>
        </form>
    
    </center>
</body>
