<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration Form</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background:#f2f2f2;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        margin:0;
    }

    .container{
        background:white;
        width:500px;
        padding:25px;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,0.3);
    }

    h2{
        text-align:center;
        margin-bottom:20px;
    }

    .form-group{
        display:flex;
        align-items:center;
        margin-bottom:15px;
    }

    .form-group label{
        width:140px;
        font-weight:bold;
    }

    input[type=text],
    input[type=password],
    input[type=email],
    input[type=date],
    select,
    textarea{
        flex:1;
        padding:8px;
    }

    textarea{
        resize:none;
    }

    .buttons{
        text-align:center;
        margin-top:20px;
    }

    .buttons input{
        padding:10px 20px;
        margin:5px;
    }
</style>

</head>
<body>

<div class="container">

<h2>Student Registration Form</h2>

<form>

<div class="form-group">
<label>Name</label>
<input type="text">
</div>

<div class="form-group">
<label>Password</label>
<input type="password">
</div>

<div class="form-group">
<label>Email</label>
<input type="email">
</div>

<div class="form-group">
<label>Gender</label>
<div>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
</div>
</div>

<div class="form-group">
<label>Hobbies</label>
<div>
<input type="checkbox"> Reading
<input type="checkbox"> Sports
<input type="checkbox"> Music
</div>
</div>

<div class="form-group">
<label>Department</label>
<select>
<option>CSE</option>
<option>ECE</option>
<option>EEE</option>
<option>IT</option>
</select>
</div>

<div class="form-group">
<label>Skills</label>
<select multiple size="4">
<option>Java</option>
<option>Python</option>
<option>HTML</option>
<option>CSS</option>
</select>
</div>

<div class="form-group">
<label>Address</label>
<textarea rows="4"></textarea>
</div>

<div class="form-group">
<label>Date of Birth</label>
<input type="date">
</div>

<div class="form-group">
<label>Upload Photo</label>
<input type="file">
</div>

<div class="buttons">
<input type="submit" value="Register">
<input type="reset" value="Clear">
</div>

</form>

</div>

</body>
</html>
