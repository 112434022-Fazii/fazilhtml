<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color:#f2f2f2;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
            width:500px;
        }

        h2{
            text-align:center;
        }

        table{
            width:100%;
        }

        td{
            padding:8px;
            vertical-align:top;
        }

        input[type=text],
        input[type=password],
        input[type=email],
        input[type=date],
        select,
        textarea{
            width:100%;
            padding:6px;
            box-sizing:border-box;
        }

        .buttons{
            text-align:center;
        }
    </style>

</head>
<body>

<div class="container">

<h2>Student Registration Form</h2>

<form>

<table>

<tr>
    <td>Name:</td>
    <td><input type="text" name="name"></td>
</tr>

<tr>
    <td>Password:</td>
    <td><input type="password" name="password"></td>
</tr>

<tr>
    <td>Email:</td>
    <td><input type="email" name="email"></td>
</tr>

<tr>
    <td>Gender:</td>
    <td>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
    </td>
</tr>

<tr>
    <td>Hobbies:</td>
    <td>
        <input type="checkbox"> Reading
        <input type="checkbox"> Sports
        <input type="checkbox"> Music
    </td>
</tr>

<tr>
    <td>Department:</td>
    <td>
        <select name="department">
            <option>CSE</option>
            <option>ECE</option>
            <option>EEE</option>
            <option>IT</option>
        </select>
    </td>
</tr>

<tr>
    <td>Skills:</td>
    <td>
        <select multiple size="4">
            <option>Java</option>
            <option>Python</option>
            <option>HTML</option>
            <option>CSS</option>
        </select>
    </td>
</tr>

<tr>
    <td>Address:</td>
    <td>
        <textarea rows="4"></textarea>
    </td>
</tr>

<tr>
    <td>Date of Birth:</td>
    <td><input type="date"></td>
</tr>

<tr>
    <td>Upload Photo:</td>
    <td><input type="file"></td>
</tr>

<tr>
    <td colspan="2" class="buttons">
        <input type="submit" value="Register">
        <input type="reset" value="Clear">
    </td>
</tr>

</table>

</form>

</div>

</body>
</html>
